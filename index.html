<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kalyan 💖 Vyshu</title>
  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      text-align:center;
      color:#fff;
      overflow-x:hidden;
    }
    h1{ margin-top:40px; font-size:3em; animation:fadeIn 2s ease-in-out; }
    p{
      font-size:1.2em; max-width:650px; margin:20px auto;
      animation:fadeIn 3s ease-in-out; padding:0 14px;
    }

    .gallery{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin:30px;
    }
    .gallery img{
      width:200px; height:200px; object-fit:cover;
      border-radius:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.3);
      transition:transform .4s;
      cursor:pointer;
    }
    .gallery img:hover{ transform:scale(1.1); }

    .heart{ font-size:50px; animation:heartbeat 1.5s infinite; margin-top:20px; }
    footer{ margin:40px 0; font-size:1em; opacity:.95; }

    .btn-wrap{
      display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
      margin-top:18px; animation:fadeIn 2.5s ease-in-out;
    }
    .btn{
      border:none; padding:12px 18px; border-radius:999px;
      background:rgba(255,255,255,.25);
      color:#fff; font-size:1rem; font-weight:600;
      cursor:pointer; box-shadow:0 8px 18px rgba(0,0,0,.18);
      backdrop-filter:blur(6px);
      transition:transform .2s, background .2s;
    }
    .btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,.33); }

    .modal{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:none; align-items:center; justify-content:center;
      padding:18px; z-index:999;
    }
    .modal.show{ display:flex; }

    .modal-card{
      width:min(520px,92vw);
      background:rgba(255,255,255,.18);
      border-radius:22px;
      padding:22px 18px;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
      backdrop-filter:blur(10px);
      position:relative;
    }

    .close{
      position:absolute; top:10px; right:12px;
      width:38px; height:38px; border-radius:50%;
      border:none; cursor:pointer;
      background:rgba(255,255,255,.22);
      color:#fff; font-size:18px; font-weight:800;
    }

    @keyframes fadeIn{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
    @keyframes heartbeat{ 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  </style>
</head>

<body>

<!-- 💖 Romantic Background Music -->
<audio id="bgMusic" loop>
  <source src="romantic.mp3" type="audio/mpeg">
</audio>

<script>
  document.addEventListener("click", function(){
    document.getElementById("bgMusic").play();
  }, { once: true });
</script>

<h1>❤️ Kalyan Vyshu ❤️</h1>

<p>
  Every line of code has logic,  
  but every moment with you has magic.  
  This little page is just to remind you  
  how special you are to me 💕
</p>

<div class="btn-wrap">
  <button class="btn" onclick="openModal('loveModal')">💌 Message</button>
  <button class="btn" onclick="openModal('promiseModal')">✨ Promise</button>
  <button class="btn" onclick="openModal('storyModal')">📖 Our Story</button>
</div>

<div class="gallery">
<img src="anime.jpg">
<img src="anime2.jpg">
<img src="anime3.jpg">
<img src="anime4.jpg">
<img src="anime5.jpg">
<img src="anime6.jpg">
<img src="anime7.jpg">
<img src="anime8.jpg">
<img src="anime9.jpg">
<img src="anime10.jpg">
</div>

<div class="heart">💖</div>

<footer>
  Made with love by <b>Kalyan</b> for <b>Vyshu</b> 👨‍💻❤️
</footer>

<script>
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
</script>

</body>
</html>
